<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سیستم مدیریت سفارشات چاپ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/persian-datepicker@1.2.0/dist/css/persian-datepicker.min.css">
<script src="https://unpkg.com/persian-date@1.1.0/dist/persian-date.min.js"></script>
<script src="https://unpkg.com/persian-datepicker@1.2.0/dist/js/persian-datepicker.min.js"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        paper: '#F6F1E7',
        ink: '#221F1B',
        accent: '#1F3A8C',
        'press-cyan': '#00AEEF',
        'press-magenta': '#E5007D',
        'press-yellow': '#FFE000',
      },
      fontFamily: {
        sans: ['Vazirmatn', 'Tahoma', 'sans-serif'],
      },
    },
  },
};
</script>

<style>
:root{
  --paper:#F6F1E7;
  --ink:#221F1B;
  --accent:#1F3A8C;
}
*{ font-family:'Vazirmatn','Tahoma',sans-serif; }
body{
  background-color:var(--paper);
  background-image:radial-gradient(rgba(34,31,27,.06) 1px, transparent 1px);
  background-size:18px 18px;
}
.color-bar{ position:fixed; inset-inline:0; top:0; height:5px; display:flex; z-index:60; }
.color-bar span{ flex:1 1 0%; }

.reg-mark{ position:absolute; width:24px; height:24px; color:var(--ink); opacity:.12; pointer-events:none; }
.reg-mark.tl{ top:16px; right:16px; }
.reg-mark.br{ bottom:16px; left:16px; }

.brand-icon{
  width:40px; height:40px; border-radius:12px;
  background:rgba(31,58,140,.1); color:var(--accent);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}

.form-group{ margin-bottom:0; }
.form-label{
  display:flex; align-items:center; gap:.45rem;
  font-size:.72rem; font-weight:700; color:rgba(34,31,27,.55);
  margin-bottom:.45rem;
}
.form-label::before{
  content:''; display:inline-block; width:6px; height:6px; border-radius9999px;
  background:var(--accent); opacity:.5; flex-shrink:0;
}
.form-input{
  width:100%; background:#fff; border:1px solid rgba(34,31,27,.14);
  border-radius:.625rem; padding:.6rem .85rem; font-size:.9rem;
  color:var(--ink); transition:border-color .15s, box-shadow .15s;
}
.form-input:focus{
  outline:none; border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(31,58,140,.12);
}
.form-input[readonly]{ cursor:pointer; background:#fdfcfa; }

.flex-input-group{ display:flex; gap:.5rem; }
.btn-add{
  flex-shrink:0; width:44px; height:44px; border-radius:.625rem;
  display:flex; align-items:center; justify-content:center;
  background:rgba(31,58,140,.08); color:var(--accent);
  font-size:1.35rem; font-weight:700; line-height:1;
  transition:background .15s, color .15s;
}
.btn-add:hover{ background:var(--accent); color:#fff; }

#dropZone.dragover{ border-color:var(--accent); background-color:rgba(31,58,140,.06); }

::-webkit-scrollbar{ height:6px; width:6px; }
::-webkit-scrollbar-thumb{ background:rgba(34,31,27,.2); border-radius:9999px; }

.pwt-datepicker-container{
  font-family:'Vazirmatn','Tahoma',sans-serif !important;
  border-radius:.75rem !important;
  box-shadow:0 10px 30px rgba(34,31,27,.18) !important;
  border:1px solid rgba(34,31,27,.08) !important;
}
.pwt-datepicker-header{ background:var(--accent) !important; }
.pwt-datepicker-day-text.pwt-datepicker-selected-day{ background:var(--accent) !important; }
.pwt-datepicker-day-text:hover{ background:rgba(31,58,140,.15) !important; }
</style>
</head>
<body class="min-h-screen flex justify-center items-center p-4 sm:p-6 lg:p-10">

<div class="color-bar" aria-hidden="true">
  <span class="bg-press-cyan"></span>
  <span class="bg-press-magenta"></span>
  <span class="bg-press-yellow"></span>
  <span class="bg-ink"></span>
</div>

<div id="authContainer" class="w-full max-w-md bg-white rounded-2xl shadow-xl shadow-ink/5 border border-ink/5 p-8 sm:p-10 text-center">
  <div class="flex items-center justify-center gap-3 mb-8">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="12" cy="12" r="5"/>
        <path d="M12 1v6M12 17v6M1 12h6M17 12h6"/>
      </svg>
    </div>
    <div class="text-right leading-tight">
      <p class="font-black tracking-[0.25em] text-ink text-sm">BIG BEAR PRINT</p>
      <p class="text-[11px] text-ink/50 font-medium">سیستم مدیریت سفارشات</p>
    </div>
  </div>

  <h2 class="text-xl font-bold text-ink mb-2">ورود به پنل مدیریت</h2>
  <p class="text-ink/50 text-sm mb-8">برای دسترسی به سیستم، با حساب گوگل مجاز خود وارد شوید.</p>

  <button id="googleLoginBtn" class="w-full bg-ink hover:bg-ink/90 text-white font-bold py-3.5 px-4 rounded-xl transition flex items-center justify-center gap-3">
    <svg class="w-5 h-5" viewBox="0 0 24 24">
      <path fill="#FFC107" d="M21.35 11.1H12v2.9h5.35c-.5 2.3-2.4 3.9-5.35 3.9-3.2 0-5.85-2.65-5.85-5.9s2.65-5.9 5.85-5.9c1.5 0 2.85.55 3.9 1.5l2.1-2.1C16.65 3.6 14.45 2.7 12 2.7 6.9 2.7 2.7 6.9 2.7 12s4.2 9.3 9.3 9.3c5.4 0 8.95-3.8 8.95-9.15 0-.65-.05-1.1-.1-1.05z"/>
    </svg>
    ورود با حساب گوگل
  </button>
</div>

<div id="appContainer" class="w-full max-w-5xl bg-white rounded-2xl shadow-xl shadow-ink/5 border border-ink/5 p-6 sm:p-10 hidden relative">
  <svg class="reg-mark tl" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
    <circle cx="12" cy="12" r="5"/><path d="M12 1v6M12 17v6M1 12h6M17 12h6"/>
  </svg>
  <svg class="reg-mark br" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
    <circle cx="12" cy="12" r="5"/><path d="M12 1v6M12 17v6M1 12h6M17 12h6"/>
  </svg>

  <div class="flex flex-wrap items-start justify-between gap-4 border-b border-ink/10 pb-6 mb-8">
    <div class="flex items-center gap-3">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v6M12 17v6M1 12h6M17 12h6"/>
        </svg>
      </div>
      <div class="leading-tight">
        <p class="text-[11px] tracking-[0.25em] uppercase text-ink/40 font-bold mb-1">BIG BEAR PRINT</p>
        <h1 class="text-xl sm:text-2xl font-extrabold text-ink">ثبت سفارش جدید</h1>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <span id="userEmailDisplay" class="text-xs font-semibold text-ink/60 bg-ink/5 px-3 py-1.5 rounded-full"></span>
      
      <a href="orders.html" class="bg-accent text-white hover:bg-accent/90 text-xs font-bold py-2 px-4 rounded-lg transition shadow-md shadow-accent/10">
        مدیریت سفارشات
      </a>

      <button id="logoutBtn" class="bg-ink/5 hover:bg-ink/10 text-ink/70 text-xs font-bold py-2 px-4 rounded-lg transition">خروج</button>
    </div>
  </div>

  <form id="orderForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-5">
    <div class="form-group">
      <label class="form-label">شماره قبض</label>
      <input type="text" id="receiptNumber" class="form-input" required>
    </div>
    <div class="form-group">
      <label class="form-label">نام مشتری</label>
      <input type="text" id="customerName" class="form-input" required>
    </div>
    <div class="form-group">
      <label class="form-label">نام نمایشی</label>
      <input type="text" id="displayName" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">وضعیت همکاری</label>
      <select id="cooperationStatus" class="form-input">
        <option value="مشتری">مشتری</option>
        <option value="همکار">همکار</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">جنس کار</label>
      <div class="flex-input-group">
        <select id="material" class="form-input"></select>
        <button type="button" onclick="addNewOption('materials')" class="btn-add">+</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">تیراژ</label>
      <div class="flex-input-group">
        <select id="quantity" class="form-input"></select>
        <button type="button" onclick="addNewOption('quantities')" class="btn-add">+</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">نام کاربر طراح</label>
      <div class="flex-input-group">
        <select id="designerName" class="form-input"></select>
        <button type="button" onclick="addNewOption('designers')" class="btn-add">+</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">چاپخانه</label>
      <div class="flex-input-group">
        <select id="printingHouse" class="form-input"></select>
        <button type="button" onclick="addNewOption('printingHouses')" class="btn-add">+</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">وضعیت تسویه حساب</label>
      <select id="settlementStatus" class="form-input">
        <option value="تسویه نشده">تسویه نشده</option>
        <option value="تسویه شده">تسویه شده</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">تاریخ سفارش</label>
      <input type="text" id="orderDate" class="form-input pdate" readonly>
    </div>
    <div class="form-group">
      <label class="form-label">تاریخ حدودی حاضر شدن</label>
      <input type="text" id="estimatedReadyDate" class="form-input pdate" readonly>
    </div>

    <div class="form-group md:col-span-2 lg:col-span-3">
      <label class="form-label">تامبنیل کارها (حداکثر ۲ عکس - تبدیل خودکار به متن کم حجم)</label>
      <div id="dropZone" class="group border-2 border-dashed border-ink/20 rounded-xl p-8 text-center cursor-pointer transition hover:border-accent hover:bg-accent/5 bg-white/60">
        <svg class="mx-auto w-9 h-9 text-ink/30 group-hover:text-accent transition mb-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 7.5 12 3m0 0L7.5 7.5M12 3v13.5"/>
        </svg>
        <p class="text-sm font-bold text-ink/70">تصاویر را بکشید و رها کنید</p>
        <p class="text-xs text-ink/40 mt-1">یا کلیک کنید برای انتخاب · حداکثر ۲ عکس · فشرده‌سازی خودکار</p>
        <input type="file" id="fileInput" accept="image/*" multiple class="hidden">
      </div>
      <div id="previewContainer" class="flex gap-4 mt-4 overflow-x-auto pb-1"></div>
    </div>

    <div class="form-group md:col-span-2 lg:col-span-3 flex justify-end pt-4 border-t border-ink/10 mt-2">
      <button type="submit" id="submitBtn" class="inline-flex items-center justify-center gap-2 bg-accent text-white font-bold py-3 px-10 rounded-xl shadow-lg shadow-accent/20 hover:bg-accent/90 active:scale-[.98] transition disabled:opacity-60 disabled:cursor-not-allowed">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/>
        </svg>
        ثبت نهایی سفارش
      </button>
    </div>
  </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { getFirestore, collection, addDoc, doc, getDoc, getDocs, setDoc, updateDoc, arrayUnion, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHdwvc6pN-_1aAq8t1KGhCCUTHAaeBwXk",
  authDomain: "printxtracker.firebaseapp.com",
  projectId: "printxtracker",
  storageBucket: "printxtracker.firebasestorage.app",
  messagingSenderId: "581653738273",
  appId: "1:581653738273:web:aaa594dc4ada2daf7dc460"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const ALLOWED_EMAIL = "thebigxbearprint@gmail.com";
let compressedImagesBase64 = [];

onAuthStateChanged(auth, (user) => {
  if (user) {
    if (user.email === ALLOWED_EMAIL) {
      $("#authContainer").addClass("hidden");
      $("#appContainer").removeClass("hidden");
      $("body").removeClass("items-center").addClass("items-start");
      $("#userEmailDisplay").text(user.email);
      initAppFeatures();
    } else {
      alert("شما اجازه دسترسی به این سیستم را ندارید.");
      signOut(auth);
    }
  } else {
    $("#appContainer").addClass("hidden");
    $("#authContainer").removeClass("hidden");
    $("body").removeClass("items-start").addClass("items-center");
  }
});

$("#googleLoginBtn").click(async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (error) {
    alert("خطا در فرآیند ورود: " + error.message);
  }
});

$("#logoutBtn").click(() => {
  signOut(auth).then(() => {
    window.location.reload();
  });
});

function initAppFeatures() {
  $('.pdate').persianDatepicker({ format: 'YYYY/MM/DD', initialValue: true, autoClose: true });
  initDragAndDrop();
  loadDropdowns();
  runAutoCleanup();
}

function initDragAndDrop() {
  const dropZone = document.getElementById("dropZone");
  const fileInput = document.getElementById("fileInput");

  dropZone.addEventListener("click", () => fileInput.click());
  dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
  dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    handleFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener("change", (e) => handleFiles(e.target.files));
}

async function handleFiles(files) {
  if (compressedImagesBase64.length + files.length > 2) {
    alert("شما حداکثر می‌توانید ۲ عکس آپلود کنید.");
    return;
  }
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    if (!file.type.startsWith('image/')) continue;

    const base64Str = await compressAndGetBase64(file, 70);
    compressedImagesBase64.push(base64Str);
    renderPreviews();
  }
}

window.removeImage = function(index) {
  compressedImagesBase64.splice(index, 1);
  renderPreviews();
};

function renderPreviews() {
  const previewContainer = document.getElementById("previewContainer");
  previewContainer.innerHTML = "";
  compressedImagesBase64.forEach((base64Str, index) => {
    const approxSizeKB = (base64Str.length * (3/4)) / 1024;
    const div = document.createElement("div");
    div.className = "relative border border-ink/10 rounded-xl p-2 bg-white shadow-sm flex-shrink-0";
    div.innerHTML = `
      <img src="${base64Str}" class="h-24 w-24 object-cover rounded-lg">
      <span class="absolute -top-2 -left-2 bg-press-magenta text-white text-xs rounded-full h-6 w-6 flex items-center justify-center cursor-pointer font-bold shadow" onclick="removeImage(${index})">✕</span>
      <p class="text-[10px] text-center mt-1.5 font-sans text-ink/40">${approxSizeKB.toFixed(1)} KB</p>
    `;
    previewContainer.appendChild(div);
  });
}

function compressAndGetBase64(file, targetSizeKB) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (event) => {
      const img = new Image();
      img.src = event.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        const MAX_DIMENSION = 900;
        if (width > MAX_DIMENSION || height > MAX_DIMENSION) {
          if (width > height) {
            height = Math.round((height * MAX_DIMENSION) / width);
            width = MAX_DIMENSION;
          } else {
            width = Math.round((width * MAX_DIMENSION) / height);
            height = MAX_DIMENSION;
          }
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        let quality = 0.7;
        function checkQuality(q) {
          const dataUrl = canvas.toDataURL('image/jpeg', q);
          const sizeKB = (dataUrl.length * (3/4)) / 1024;
          if (sizeKB <= targetSizeKB || q <= 0.1) {
            resolve(dataUrl);
          } else {
            checkQuality(q - 0.1);
          }
        }
        checkQuality(quality);
      };
    };
  });
}

async function loadDropdowns() {
  const docRef = doc(db, "settings", "dropdowns");
  const docSnap = await getDoc(docRef);
  if (docSnap.exists()) {
    const data = docSnap.data();
    populateSelect("material", data.materials || []);
    populateSelect("quantity", data.quantities || []);
    populateSelect("designerName", data.designers || []);
    populateSelect("printingHouse", data.printingHouses || []);
  } else {
    await setDoc(docRef, { materials: [], quantities: [], designers: [], printingHouses: [] });
  }
}

function populateSelect(elementId, items) {
  const select = document.getElementById(elementId);
  select.innerHTML = "";
  items.forEach(item => {
    const option = document.createElement("option");
    option.value = item;
    option.textContent = item;
    select.appendChild(option);
  });
}

window.addNewOption = async function(categoryArrayName) {
  const newValue = prompt("لطفا مقدار جدید را وارد کنید:");
  if (!newValue || newValue.trim() === "") return;
  const docRef = doc(db, "settings", "dropdowns");
  try {
    await updateDoc(docRef, { [categoryArrayName]: arrayUnion(newValue.trim()) });
    alert("با موفقیت اضافه شد!");
    loadDropdowns();
  } catch (error) {
    alert("خطا در افزودن مقدار.");
  }
};

document.getElementById("orderForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("submitBtn");
  btn.textContent = "در حال ثبت سفارش...";
  btn.disabled = true;

  try {
    const orderData = {
      receiptNumber: document.getElementById("receiptNumber").value,
      customerName: document.getElementById("customerName").value,
      displayName: document.getElementById("displayName").value,
      cooperationStatus: document.getElementById("cooperationStatus").value,
      material: document.getElementById("material").value,
      quantity: document.getElementById("quantity").value,
      designerName: document.getElementById("designerName").value,
      printingHouse: document.getElementById("printingHouse").value,
      settlementStatus: document.getElementById("settlementStatus").value,
      orderDate: document.getElementById("orderDate").value,
      estimatedReadyDate: document.getElementById("estimatedReadyDate").value,
      status: "سفارش داده شده",
      thumbnails: compressedImagesBase64,
      createdAt: new Date().toISOString(),
      deliveredAt: null
    };

    await addDoc(collection(db, "orders"), orderData);
    alert("سفارش با موفقیت ثبت شد!");
    document.getElementById("orderForm").reset();
    compressedImagesBase64 = [];
    renderPreviews();
    loadDropdowns();

  } catch (error) {
    console.error(error);
    alert("خطا در سیستم ثبت دیتابیس!");
  } finally {
    btn.innerHTML = `<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg> ثبت نهایی سفارش`;
    btn.disabled = false;
  }
});

async function runAutoCleanup() {
  const tenDaysInMs = 10 * 24 * 60 * 60 * 1000;
  const now = new Date();
  try {
    const q = query(collection(db, "orders"), where("status", "==", "تحویل داده شده"));
    const querySnapshot = await getDocs(q);
    querySnapshot.forEach(async (docSnapshot) => {
      const data = docSnapshot.data();
      if (data.deliveredAt && data.thumbnails && data.thumbnails.length > 0) {
        const deliveryDate = new Date(data.deliveredAt);
        if (now - deliveryDate > tenDaysInMs) {
          await updateDoc(doc(db, "orders", docSnapshot.id), { thumbnails: [] });
        }
      }
    });
  } catch (error) {
    console.error(error);
  }
}
</script>
</body>
</html>
